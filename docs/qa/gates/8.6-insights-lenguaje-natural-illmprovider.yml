nfr_validation:
  security:
    status: PASS
    notes: >
      sanitize() en buildInsightPrompt previene prompt injection con nombres de entidades
      (strip <>{}"'` + truncate a 80 chars). userId obtenido del server auth — sin IDOR.
      Correlaciones vienen de DB del usuario (datos propios, no externos).
  performance:
    status: PASS
    notes: >
      Llamada LLM asíncrona. Page.tsx usa .catch(() => null) para evitar bloqueo de SSR.
      useTransition en ReportsClient para acción "Regenerar" — no bloquea UI.
      Loading skeleton visible mientras regenera.
  reliability:
    status: PASS
    notes: >
      Fallback graceful en generateReportInsights — retorna mensaje estático con datos numéricos
      si LLM falla (try/catch completo). MockProvider para tests y desarrollo sin API key.
      Promise.allSettled en page.tsx — fallo de insights no bloquea el resto de la página.
  maintainability:
    status: PASS
    notes: >
      Patrón ILLMProvider extensible — agregar OpenAI provider es trivial (implementar interface).
      Factory via NEXT_PUBLIC_LLM_PROVIDER env var. buildInsightPrompt es función pura
      completamente testeable sin mocks. Separación clara: interface / providers / factory / prompt.

