        Corregir sidebar collapse en desktop: cambiar clase 'w-0 flex xl:w-64'
        a 'w-0' cuando isOpen=false. Verificar comportamiento en >1280px.
      refs:
        - components/layout/Sidebar.tsx
        - app/(app)/layout.tsx

  future:
    - action: >
        Consolidar design tokens — reemplazar colores hardcodeados (#1c2434, #adb7be)
        en Sidebar.tsx con CSS variables del sistema shadcn.
      refs:
        - components/layout/Sidebar.tsx
        - app/globals.css
    - action: >
        Auditar package.json y mover dependencias AIOS (@clack/prompts, fs-extra,
        inquirer, yaml) a devDependencies o eliminar si no son necesarias para la app.
      refs:
        - package.json
    - action: >
        Uniformizar uso de Tailwind tokens — cambiar bg-[var(--background)]
        a bg-background en app/(auth)/layout.tsx.
      refs:
        - app/(auth)/layout.tsx
