schema: 1
story: '1.1'
story_title: 'Setup proyecto (Next.js 16 + TailAdmin + Tailwind v4 + TypeScript + shadcn/ui)'
gate: CONCERNS
status_reason: >
  Todos los 10 ACs están implementados y verificados. El tooling (TypeScript strict, ESLint,
  Prettier, Husky, shadcn/ui) es correcto. Se identificó un concern MEDIUM: el sidebar no
  colapsa visualmente en desktop (xl+) cuando isOpen=false — la clase 'xl:w-64' siempre
  mantiene el ancho completo en pantallas grandes. Para una story de foundation/setup con
  placeholder content el impacto es bajo, pero debe corregirse antes de iterar sobre el layout.
reviewer: 'Quinn (Test Architect)'
updated: '2026-02-20T00:00:00Z'

top_issues:
  - id: CONCERN-01
    severity: medium
    category: ui-behavior
    description: >
      Sidebar no colapsa en desktop (xl+). En Sidebar.tsx línea 61,
      la clase 'xl:w-64' en el estado isOpen=false garantiza que el sidebar
      siempre ocupe 64 unidades en pantallas xl+, independientemente del toggle.
      El ChevronLeft no tiene efecto visual en desktop.
    file: components/layout/Sidebar.tsx
    line: 61
    recommendation: >
      Cambiar 'w-0 flex xl:w-64' por 'w-0' cuando isOpen=false para que el
      collapse funcione en todos los breakpoints. Ajustar la lógica de margen
      en AppLayout si se desea siempre-visible en desktop (xl:ml-64 siempre).
    suggested_owner: dev

  - id: LOW-01
    severity: low
    category: dependency-hygiene
    description: >
      package.json contiene dependencias runtime del framework AIOS
      (@clack/prompts, fs-extra, inquirer, yaml) que no son usadas
      por la app Next.js y añaden peso al bundle.
    file: package.json
    recommendation: Mover a devDependencies o evaluar si son necesarias.
    suggested_owner: dev

  - id: LOW-02
    severity: low
    category: css-architecture
    description: >
      Sistema dual de tokens CSS en globals.css: variables --sidebar-bg legadas
      (hardcodeadas como #1c2434 en Sidebar.tsx) coexisten con tokens shadcn
      --sidebar (oklch). Crea inconsistencia en el design token system.
    file: app/globals.css
    recommendation: >
      Consolidar en próxima iteración de layout. Reemplazar colores hardcodeados
      en Sidebar.tsx con CSS vars del sistema de diseño.
    suggested_owner: dev

  - id: LOW-03
    severity: low
    category: tailwind-consistency
    description: >
      app/(auth)/layout.tsx usa bg-[var(--background)] (raw CSS var syntax)
      en lugar de bg-background (Tailwind token). Inconsistente con otros componentes.
    file: app/(auth)/layout.tsx
    line: 3
    recommendation: Cambiar a bg-background para consistencia.
    suggested_owner: dev

