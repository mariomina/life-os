top_issues:
  - id: 'LOW-1'
    severity: low
    category: code
    description: >
      La query de inbox en getWeeklyReviewData (actions/weekly-review.ts:92-98) no filtra
      por status — devuelve todos los items del usuario incluyendo 'processed' y 'discarded'.
      El comentario indica intención de filtrar solo 'pending'|'processing', pero el WHERE
      clause solo tiene eq(inboxItems.userId, userId) sin filtro de status adicional.
    suggested_action: >
      Agregar: inArray(inboxItems.status, ['pending', 'processing']) en la cláusula WHERE.
      Aceptable para MVP — priorizar en backlog de deuda técnica.
    suggested_owner: dev

