nfr_validation:
  security:
    status: PASS
    notes: >
      userId obtenido del server auth (createSupabaseServerClient). Las 10 queries paralelas
      filtran por userId — sin IDOR. localStorage solo guarda fecha ISO (no datos sensibles).
      Patterns filtrados a non-neutral + full tier antes de mostrar.
  performance:
    status: PASS
    notes: >
      Promise.allSettled con 10 queries paralelas — sin cascada serial. settled() helper
      previene bloqueo por fallos individuales. useState lazy initializer para localStorage —
      sin race condition de SSR (typeof window === 'undefined' guard). PhaseIndicator O(1).
  reliability:
    status: PASS
    notes: >
      aggregateWeeklyMetrics retorna valores seguros para inputs vacíos: ccrRate null,
      habitConsistencyAvg 0, okrProgressAvg 0, arrays vacíos. Cada fase del wizard tiene
      estado vacío manejado con mensajes informativos ("¡Inbox limpio!", etc.).
      Completar review guarda timestamp en localStorage — persistencia entre sesiones.
  maintainability:
    status: PASS
    notes: >
      Wizard en WeeklyReviewClient.tsx con fases bien separadas (MeasurePhase, AnalyzePhase,
      PlanPhase, ConfirmPhase) — fácil agregar fase 5 en el futuro. aggregateWeeklyMetrics
      es función pura reutilizable. getWeeklyReviewData orquesta todas las fuentes en un solo
      punto de entrada. Helpers pct() y formatSeconds() son locales y simples.

