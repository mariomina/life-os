schema: 1
story: '5.9'
story_title: 'Supabase Realtime — Timer Activo con Latencia <1s'
gate: PASS
status_reason: >
  Todos los 6 ACs implementados y verificados. 14 tests nuevos pasan (407 total sin regresión).
  NFR7 (latencia <1s) cumplido via setInterval local + Supabase Realtime. Dos concerns MEDIUM
  documentados como deuda técnica: (1) canal Realtime re-suscrito en cada cambio de activeTimers,
  (2) browser client instanciado dentro del useEffect en lugar de fuera. Ambos son funcionales
  para MVP y no bloquean el gate.
reviewer: 'Quinn (Test Architect)'
updated: '2026-02-26T14:30:00.000Z'

top_issues:
  - id: 'MEDIUM-1'
    severity: medium
    category: performance
    description: >
      Realtime useEffect tiene `activeTimers` como dependencia, causando re-suscripción del canal
      en cada acción de timer (start/stop/pause/resume). Genera ~200ms de latencia adicional
      por operación y crea/destruye el canal frecuentemente.
    recommendation: >
      Extraer el Map de activeTimers a useRef para evitar la dependencia, o separar el efecto
      Realtime del efecto de live clock. Refactoring candidato para una story de deuda técnica.
    suggested_owner: dev

  - id: 'MEDIUM-2'
    severity: medium
    category: performance
    description: >
      AC5 especifica "cliente creado UNA vez con useMemo o constante fuera del componente".
      La implementación crea el browser client dentro del useEffect, generando una nueva instancia
      en cada re-suscripción del canal.
    recommendation: >
      Mover `const supabase = createSupabaseBrowserClient()` fuera del useEffect o usar useMemo.
      Prioridad baja dado que createBrowserClient es ligero y la re-suscripción ya maneja cleanup.
    suggested_owner: dev

  - id: 'LOW-1'
    severity: low
    category: tests
    description: >
      AC6.5 especifica `calcTotalWithActive(completedSeconds, elapsedSeconds)` como función pura
      testeable. La implementación hace la suma inline en DayView (completedSeconds + elapsedSeconds).
      La lógica es correcta pero no hay un test explícito para "suma correcta".
    recommendation: >
      Acceptable para MVP — la suma inline de 2 números no justifica una función separada.
      Si se introduce lógica más compleja en el futuro, extraer entonces.
    suggested_owner: po

