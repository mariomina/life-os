nfr_validation:
  security:
    status: PASS
    notes: >
      getActiveTimerStartTimes usa userId del server (no input del usuario). Sin IDOR.
      Canal Realtime filtrado por RLS en Supabase — datos del usuario solo visibles a sí mismo.
      No hay imports de server client en Client Components.
  performance:
    status: PASS
    notes: >
      NFR7 cumplido: setInterval(1000ms) local — 0 round-trips al servidor por tick.
      Supabase Realtime latencia típica 100-500ms < 1s target.
      Re-suscripción de canal por activeTimers change (~200ms) dentro del límite.
      Tres fetches paralelos en page.tsx con Promise.allSettled — no hay cascada serial.
  reliability:
    status: PASS
    notes: >
      clearInterval en cleanup del useEffect — sin memory leaks del setInterval.
      removeChannel en cleanup del useEffect — sin subscripciones huérfanas.
      calcElapsedSeconds con Math.max(0, elapsed) — protección contra clock drift negativo.
      Promise.allSettled con fallback {} — page no crashea si algún fetch falla.
  maintainability:
    status: PASS
    notes: >
      formatElapsed y calcElapsedSeconds son funciones puras exportadas y testeadas en aislamiento.
      Comentarios inline claros con referencias a Story 5.9 y ACs.
      Separación de responsabilidades: server action en timer.ts, state en CalendarClient,
      display en DayView. Patrón consistente con Story 5.8.

recommendations:
  immediate: []
  future:
    - action: >
        Refactorizar Realtime useEffect para evitar re-suscripción en cada cambio de activeTimers.
        Usar useRef para el Map o separar el efecto del live clock.
      refs:
        - 'app/(app)/calendar/_components/CalendarClient.tsx'
        - 'Realtime useEffect (línea ~706)'
    - action: >
        Mover createSupabaseBrowserClient() fuera del useEffect (useMemo o módulo-level const)
        para cumplir AC5 completamente.
      refs:
        - 'app/(app)/calendar/_components/CalendarClient.tsx'
